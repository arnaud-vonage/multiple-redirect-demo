project:
    name: masked-calling-modified
instance:
    name: dev
    runtime: nodejs22
    region: aws.apse1
    application-id: d8d0ad02-6a27-48f1-b5e8-5e40a699b8c8
    capabilities:
        - voice
    environment:
        - name: ADMIN_API_KEY
          secret: ADMIN_API_KEY
        - name: ENABLE_DEBUG_ROUTES
          value: "false"
    secrets:
        - ADMIN_API_KEY
    entrypoint:
        - node
        - index.js
debug:
    name: debug
    application-id: d8d0ad02-6a27-48f1-b5e8-5e40a699b8c8
    capabilities:
        - voice
    environment:
        - name: ADMIN_API_KEY
          secret: ADMIN_API_KEY
        - name: ENABLE_DEBUG_ROUTES
          value: "true"
    secrets:
        - ADMIN_API_KEY
    entrypoint:
        - nodemon
        - --inspect
        - index.js
